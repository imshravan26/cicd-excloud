name: deploy node js code on Excloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and Push
        run: |
          docker build -t shrvn26/deploy-node .
          docker push shrvn26/deploy-node

      - name: Deploy to Excloud
        uses: appleboy/ssh-action@master
        with:
          host: 210.79.129.33
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/cicd-excloud
            if [ -s "$HOME/.profile" ]; then . "$HOME/.profile"; fi
            if [ -s "$HOME/.bashrc" ]; then . "$HOME/.bashrc"; fi
            if [ -s "$HOME/.nvm/nvm.sh" ]; then . "$HOME/.nvm/nvm.sh"; fi
            if command -v nvm >/dev/null 2>&1; then
              nvm use --lts || nvm install --lts
            fi
            command -v node
            command -v npm
            git pull origin main
            npm install
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart 0 || pm2 start index.js --name chai-cicd
            else
              npx pm2 restart 0 || npx pm2 start index.js --name chai-cicd
            fi
