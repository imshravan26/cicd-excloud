name: deploy node js code on Excloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and Push
        run: |
          docker build -t shrvn26/deploy-node .
          docker push shrvn26/deploy-node

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.168
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # kill the existing container if it exists
            docker rm -f deploy-node || true

            # Again pull the freash image from hub
            sudo docker pull shrvn26/deploy-node

            # Run docker run -d -- name deploy-node --restart unless-stopped -p 8000:8000 shrvn26/deploy-node
            sudo docker run -d --name deploy-node --restart unless-stopped -p 8000:8000 shrvn26/deploy-node

            #clean up old/unused images
            sudo docker image prune -f

            

            