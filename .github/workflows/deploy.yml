name: depoy node js code on Excloud


on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: npm install

      - name: Deploy to Excloud
        uses: appleboy/ssh-action@master
        with:
          host: 210.79.129.33
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/cicd-excloud
          git pull origin main
          npm install
          pm2 restart 0